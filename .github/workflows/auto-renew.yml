name: Acore Hosting Auto Renew

on:
  schedule:
    - cron: "0 1,13 * * *"
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install CloakBrowser
        run: pip install cloakbrowser

      - name: Restore storage_state
        env:
          STORAGE_B64: ${{ secrets.STORAGE_STATE_B64 }}
        run: echo "$STORAGE_B64" | base64 -d > storage_state.json

      - name: Run renewal
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python auto_renew.py --headless

      - name: Update STORAGE_STATE_B64 secret
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          ENCODED=$(base64 -w0 storage_state.json)
          gh secret set STORAGE_STATE_B64 --body "$ENCODED" --repo ${{ github.repository }}
